name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.1.0-dev"
          fi
          # Extract version code from patch number, fallback to run number
          VERSION_CODE="${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (code: $VERSION_CODE)"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore src/BDP.App/BDP.App.csproj

      - name: Build APK
        run: >
          dotnet publish src/BDP.App/BDP.App.csproj
          -c Release
          -f net10.0-android
          -p:AndroidPackageFormat=apk
          -p:AppVersion=${{ steps.version.outputs.version }}
          -p:AppVersionCode=${{ steps.version.outputs.version_code }}
          -o ./artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BDP-Android-${{ steps.version.outputs.version }}
          path: ./artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: BDP ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/*.apk
